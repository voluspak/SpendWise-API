services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-spendwise}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spendwise}
      POSTGRES_DB: ${DB_NAME:-spendwise}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
